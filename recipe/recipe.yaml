# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: django-nyt
  version: 1.6.0

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/django_nyt-${{ version }}.tar.gz
  sha256: 8e3ca3d4bf6d91d6adfe10df6b0dc37b48e24cacd790fa93583c01c714cf931b

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }},<4.0
    - django >=4.2,<6.1
    - channels
tests:
  - python:
      imports:
        - django_nyt
      python_version: ${{ python_min }}.*
      pip_check: true

about:
  summary: A pluggable notification system written for the Django framework.
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/django-wiki/django-nyt
  repository: https://github.com/django-wiki/django-nyt

extra:
  recipe-maintainers:
    - rxm7706
